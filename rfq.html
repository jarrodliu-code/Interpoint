<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request for Quotation</title>
<style>
  body{font-family:Arial,"Microsoft YaHei","PingFang SC",sans-serif;margin:0;color:#1a2433;background:#f4f6f9}
  .wrap{max-width:1000px;margin:0 auto;padding:16px}
  h1{font-size:20px;margin:0 0 4px}
  .meta{color:#555;font-size:13px;margin-bottom:6px}
  .note{font-size:12px;color:#555;margin:6px 0 14px}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .btn{background:#1f6feb;color:#fff;border:0;padding:9px 15px;border-radius:7px;cursor:pointer;font-size:13px;text-decoration:none;display:inline-block}
  table{border-collapse:collapse;width:100%;font-size:12px;background:#fff}
  th,td{border:1px solid #bbb;padding:5px 6px;vertical-align:top}
  th{background:#0f2740;color:#fff;font-weight:600;position:sticky;top:0}
  td.img img{width:74px;height:74px;object-fit:cover;border-radius:4px}
  td.img .u{font-size:8px;color:#888;max-width:84px;word-break:break-all}
  td.nm{min-width:150px}td.ds{min-width:150px;color:#444}
  tr:nth-child(even) td{background:#f7f9fc}
  a{color:#1f6feb}
  .loading{padding:40px;text-align:center;color:#666}
  @media print{.bar{display:none}body{background:#fff}}
</style>
</head>
<body>
<div class="wrap">
  <div id="app"><div class="loading">Loading…</div></div>
</div>
<script>
const SUPABASE_URL="https://awhijbgonnmbmymvbzlb.supabase.co";
const SUPABASE_KEY="sb_publishable_0gCzyKbXWiWj-UCvyI9mXg_ixERRH0B";
const L={
  en:{title:'Request for Quotation',sub:'Please fill in the blank columns and send this back to us.',no:'No.',img:'Image',ref:'Ref',name:'Product',desc:'Description',link:'Link',view:'Open',qty:'Required Qty',price:'Unit Price (EUR)',moq:'MOQ',lead:'Lead Time',incoterm:'Incoterm',sample:'Sample Cost (EUR)',remark:'Remarks',from:'From',date:'Date',print:'🖨 Print / Save PDF'},
  zh:{title:'询价单',sub:'请填写空白栏并回传给我们。',no:'序号',img:'图片',ref:'编号',name:'产品',desc:'描述',link:'链接',view:'查看',qty:'需求数量',price:'单价(欧元)',moq:'最小起订量',lead:'交货期',incoterm:'贸易术语',sample:'样品费(欧元)',remark:'备注',from:'来自',date:'日期',print:'🖨 打印 / 存为PDF'}
};
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const params=new URLSearchParams(location.search);
const lang=params.get('lang')==='zh'?'zh':'en';
const ids=(params.get('ids')||'').split(',').map(s=>s.trim()).filter(Boolean);
document.documentElement.lang=lang;

async function api(pathAndQuery){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+pathAndQuery,{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}
async function load(){
  const Lx=L[lang];
  if(!ids.length){document.getElementById('app').innerHTML='<div class="loading">This quotation list is empty.</div>';return;}
  let brand='Interpoint';
  try{
    const products=await api('products?select=id,ref,name,specs,image,url,qty&id=in.('+ids.join(',')+')');
    try{const s=await api("settings?select=brand&id=eq.app");if(s&&s[0]&&s[0].brand)brand=s[0].brand;}catch(e){}
    const byId={};products.forEach(p=>byId[p.id]=p);
    const items=ids.map(id=>byId[id]).filter(Boolean);
    render(items,brand,Lx);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="loading">Could not load the list ('+esc(e.message)+').<br>Please check your internet connection and try again.</div>';
  }
}
function render(items,brand,Lx){
  const rows=items.map((p,i)=>`<tr>
    <td>${i+1}</td>
    <td class="img">${p.image?`<a href="${esc(p.image)}" target="_blank" rel="noopener"><img src="${esc(p.image)}" loading="lazy"></a>`:''}</td>
    <td>${esc(p.ref||'')}</td>
    <td class="nm">${esc(p.name)}</td>
    <td class="ds">${esc(p.specs||'')}</td>
    <td>${p.url?`<a href="${esc(p.url)}" target="_blank" rel="noopener">${Lx.view}</a>`:''}</td>
    <td>${p.qty!=null?p.qty:''}</td>
    <td></td><td></td><td></td><td></td><td></td><td></td></tr>`).join('');
  document.getElementById('app').innerHTML=`
    <h1>${esc(Lx.title)}</h1>
    <div class="meta">${Lx.from}: ${esc(brand)} &nbsp;|&nbsp; ${Lx.date}: ${new Date().toISOString().slice(0,10)} &nbsp;|&nbsp; ${items.length} ${lang==='zh'?'项':'items'}</div>
    <div class="note">${esc(Lx.sub)}</div>
    <div class="bar"><button class="btn" onclick="window.print()">${Lx.print}</button></div>
    <table><thead><tr>
      <th>${Lx.no}</th><th>${Lx.img}</th><th>${Lx.ref}</th><th>${Lx.name}</th><th>${Lx.desc}</th><th>${Lx.link}</th><th>${Lx.qty}</th><th>${Lx.price}</th><th>${Lx.moq}</th><th>${Lx.lead}</th><th>${Lx.incoterm}</th><th>${Lx.sample}</th><th>${Lx.remark}</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}
load();
</script>
</body>
</html>
