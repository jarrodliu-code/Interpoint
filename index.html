<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cloth Alteration | 服装修改</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f7f2;font-family:'PingFang SC','Segoe UI',system-ui,sans-serif;min-height:100vh}
.app{max-width:640px;margin:0 auto;padding:20px 16px}
.lang-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px}
.lang-btn{padding:5px 14px;border-radius:20px;border:2px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#888}
.lang-btn.active{border-color:#52b788;background:#f0faf4;color:#2d6a4f;font-weight:700}
.header{text-align:center;margin-bottom:24px}
.header .scissors{font-size:32px;margin-bottom:6px}
.header h1{font-size:22px;font-weight:800;color:#1b4332;margin:0}
.header p{font-size:13px;color:#666;margin-top:4px}
.steps{display:flex;align-items:center;margin-bottom:24px}
.step-wrap{display:flex;align-items:center;flex:1}
.step-wrap:last-child{flex:none}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-dot.done{background:#2d6a4f;color:#fff}
.step-dot.active{background:#52b788;color:#fff;border:2px solid #2d6a4f}
.step-dot.pending{background:#e8f5e9;color:#aaa}
.step-label{font-size:10px;margin-top:3px;text-align:center;white-space:nowrap}
.step-col{display:flex;flex-direction:column;align-items:center}
.step-line{flex:1;height:2px;background:#e0e0e0;margin:0 4px;margin-bottom:16px}
.step-line.done{background:#2d6a4f}
h2{font-size:16px;font-weight:700;color:#1b4332;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{border:2px solid #e0e0e0;border-radius:12px;padding:12px 14px;cursor:pointer;background:#fff;transition:all 0.15s}
.card:hover{border-color:#a8d5b5}
.card.selected{border-color:#52b788;background:#f0faf4}
.card-garment{display:flex;align-items:center;gap:10px}
.card-garment .emoji{font-size:28px}
.card-garment .name{font-weight:700;font-size:14px;color:#1b4332}
.card-garment .desc{font-size:11px;color:#888;margin-top:2px}
.card-alt{display:flex;justify-content:space-between;align-items:flex-start}
.card-alt .label{font-weight:600;font-size:12px;color:#1b4332}
.card-alt .sub{font-size:10px;color:#888;margin-top:2px}
.card-alt .price{font-weight:700;color:#52b788;font-size:13px;white-space:nowrap;margin-left:6px;flex-shrink:0}
.other-card{grid-column:1/-1}
.input-wrap{margin-top:12px}
.input-wrap label{font-size:12px;color:#555;font-weight:600;display:block;margin-bottom:5px}
input[type=text],textarea{width:100%;padding:10px 12px;border:2px solid #52b788;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
textarea{resize:vertical}
.subtotal{margin-top:10px;padding:9px 12px;background:#f0faf4;border-radius:8px;font-size:12px;color:#2d6a4f}
.price-note{margin:12px 0;padding:10px 14px;background:#fffbe6;border:1px solid #ffe58f;border-radius:8px;font-size:12px;color:#7d6608;line-height:1.5}
.customer-section{margin:14px 0;padding:12px 14px;background:#f8f8f8;border-radius:10px;border:1px solid #e0e0e0}
.customer-section input{margin-bottom:0}
.wechat-id-box{display:flex;align-items:center;gap:8px;background:#f0faf4;border:2px solid #52b788;border-radius:10px;padding:10px 16px;margin:12px 0}
.wechat-id-label{font-size:13px;color:#555}
.wechat-id-val{font-size:18px;font-weight:800;color:#1b4332;flex:1;letter-spacing:1px}
.btn-copy-id{padding:5px 12px;background:#52b788;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.device-hint{font-size:12px;color:#666;line-height:1.6;text-align:left;background:#f8f8f8;border-radius:8px;padding:8px 12px;margin-top:6px}
.urgency-card{display:flex;justify-content:space-between;align-items:center}
.urgency-label{font-weight:700;font-size:14px;color:#1b4332}
.urgency-desc{font-size:12px;color:#888;margin-top:2px}
.urgency-badge{font-size:10px;background:#fff3cd;color:#856404;padding:2px 7px;border-radius:20px;font-weight:600;margin-left:6px}
.urgency-price{text-align:right}
.urgency-price .amount{font-weight:700;color:#52b788;font-size:16px}
.urgency-price .est{font-size:10px;color:#aaa}
.summary-label{font-size:10px;color:#888;font-weight:600;text-transform:uppercase;margin-bottom:4px}
.summary-box{background:#f8f8f8;border-radius:8px;padding:10px 12px;font-size:13px;color:#1b4332;font-weight:600;margin-bottom:10px}
.alt-list{border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;margin-bottom:10px}
.alt-row{display:flex;justify-content:space-between;padding:9px 12px;font-size:12px;border-bottom:1px solid #f0f0f0}
.alt-row:last-child{border-bottom:none}
.alt-row.surcharge{background:#fffbf0;color:#856404}
.total-bar{display:flex;justify-content:space-between;align-items:center;background:#1b4332;border-radius:12px;padding:14px 18px;color:#fff;margin-bottom:14px}
.total-bar .label{font-size:12px;opacity:0.8}
.total-bar .note{font-size:10px;opacity:0.6;margin-top:2px}
.total-bar .amount{font-size:30px;font-weight:800}
.tbc-bar{background:#1b4332;border-radius:12px;padding:14px 18px;color:#fff;font-size:13px;margin-bottom:14px;opacity:0.9}
.btn-row{display:flex;gap:8px;margin-bottom:8px}
.btn{padding:11px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-outline{background:#fff;border:2px solid #e0e0e0;color:#555}
.btn-green{background:#52b788;color:#fff;font-weight:700}
.btn-green:disabled{background:#c8e6c9;cursor:not-allowed}
.btn-wechat{background:#07C160;color:#fff;font-weight:700}
.btn-back-link{background:none;border:none;color:#52b788;font-size:13px;font-weight:600;cursor:pointer;padding:0;margin-top:4px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
/* QR page */
.qr-page{max-width:440px;margin:0 auto;padding:20px 16px}
.qr-page .back{background:none;border:none;color:#52b788;font-weight:700;font-size:14px;cursor:pointer;margin-bottom:16px;padding:0}
.qr-page .center{text-align:center}
.qr-page h2{font-size:18px;font-weight:800;color:#1b4332;margin-bottom:6px}
.qr-page p{font-size:13px;color:#666;margin-bottom:20px}
.qr-img{width:210px;height:210px;border-radius:14px;border:3px solid #52b788;display:block;margin:0 auto 20px}
.copy-box{background:#f8f8f8;border-radius:8px;padding:12px 14px;margin-bottom:14px;text-align:left}
.copy-box .hint{font-size:11px;color:#888;font-weight:600;margin-bottom:6px}
.copy-box pre{font-size:11px;color:#333;white-space:pre-wrap;line-height:1.6;font-family:inherit}
.btn-copy{width:100%;padding:12px;border-radius:8px;border:none;background:#07C160;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px}
.btn-copy.copied{background:#2d6a4f}
.btn-close{width:100%;padding:10px;border-radius:8px;border:2px solid #e0e0e0;background:#fff;color:#555;font-size:13px;font-weight:600;cursor:pointer}
</style>
</head>

let state = {
  lang: "zh",
  step: 0,
  garment: null,
  otherGarment: "",
  selected: {},
  otherAlt: "",
  urgency: "standard",
  showQR: false,
  copied: false,
  copiedId: false,
  customerName: "",
  customerWeChat: "",
};

function t(){ return LANG[state.lang]; }
function gName(){ 
  if(state.garment==="other") return state.otherGarment || t().otherG;
  const g = t().garments.find(x=>x.id===state.garment);
  return g ? g.name : "";
}
function gEmoji(){
  if(state.garment==="other") return "✏️";
  const g = t().garments.find(x=>x.id===state.garment);
  return g ? g.emoji : "";
}
function selectedAlts(){
  if(!state.garment||state.garment==="other") return [];
  const list = t().alts[state.garment] || [];
  return list.filter(a=>state.selected[a.id]);
}
function baseTotal(){ return selectedAlts().reduce((s,a)=>s+a.price,0); }
function urgObj(){ return t().urgency.find(u=>u.id===state.urgency); }
function finalTotal(){ return Math.round(baseTotal()*urgObj().mult); }

function canNext(){
  if(state.step===0){
    if(!state.garment) return false;
    if(state.garment==="other"&&!state.otherGarment.trim()) return false;
    return true;
  }
  if(state.step===1){
    if(state.garment==="other") return state.otherAlt.trim().length>0;
    return selectedAlts().length>0 || (state.selected["other_alt"]&&state.otherAlt.trim());
  }
  return true;
}

function buildMsg(){
  const l = state.lang;
  const urgency = urgObj();
  const cName = state.customerName.trim();
  const cWeChat = state.customerWeChat.trim();
  const contactEn = [cName?"Name: "+cName:"", cWeChat?"WeChat: "+cWeChat:""].filter(Boolean).join("\n");
  const contactZh = [cName?"姓名："+cName:"", cWeChat?"微信号："+cWeChat:""].filter(Boolean).join("\n");
  if(state.garment==="other"){
    return l==="en"
      ? `Hi! I'd like to book a clothing alteration.${contactEn?"\n\n"+contactEn:""}

Garment: ${gEmoji()} ${gName()}

Details: ${state.otherAlt.trim()}

Turnaround: ${urgency.name} (${urgency.desc})

Please advise on pricing. Thank you!`
      : `您好！我想预约服装修改。${contactZh?"\n\n"+contactZh:""}

服装类型：${gEmoji()} ${gName()}

修改说明：${state.otherAlt.trim()}

交货时间：${urgency.name}（${urgency.desc}）

请告知价格，谢谢！`;
  }
  const alts = selectedAlts().map(a=>`• ${a.name} – $${a.price}`).join("\n");
  const other = state.selected["other_alt"]&&state.otherAlt.trim() ? `• ${l==="en"?"Other":"其他"}: ${state.otherAlt.trim()}` : "";
  const all = [alts,other].filter(Boolean).join("\n");
  return l==="en"
    ? `Hi! I'd like to book a clothing alteration.${contactEn?"\n\n"+contactEn:""}\n\nGarment: ${gEmoji()} ${gName()}\n\nAlterations:\n${all}\n\nTurnaround: ${urgency.name} (${urgency.desc})\nEstimated Total: $${finalTotal()}\n\nPlease let me know your availability. Thank you!`
    : `您好！我想预约服装修改。${contactZh?"\n\n"+contactZh:""}\n\n服装类型：${gEmoji()} ${gName()}\n\n修改项目：\n${all}\n\n交货时间：${urgency.name}（${urgency.desc}）\n预估费用：$${finalTotal()}\n\n请告知您的空档时间，谢谢！`;
}

function render(){
  document.getElementById("app").innerHTML = state.showQR ? renderQR() : renderMain();
  attachEvents();
}

function renderSteps(){
  const steps = t().steps;
  return `<div class="steps">${steps.map((s,i)=>{
    const done=i<state.step, active=i===state.step;
    const cls=done?"done":active?"active":"pending";
    const color=active?"#2d6a4f":done?"#2d6a4f":"#aaa";
    return `<div class="step-col">
      <div class="step-dot ${cls}">${done?"✓":i+1}</div>
      <div class="step-label" style="color:${color};font-weight:${active?"700":"400"}">${s}</div>
    </div>${i<steps.length-1?`<div class="step-line${done?" done":""}"></div>`:""}`;
  }).join("")}</div>`;
}

function renderNav(){
  const back = state.step>0 ? `<button class="btn btn-outline" id="btnBack">${t().back}</button>` : `<span></span>`;
  const nextLabel = state.step===2 ? t().estimate : t().next;
  return `<div class="nav">${back}<button class="btn btn-green" id="btnNext" ${canNext()?"":"disabled"}>${nextLabel}</button></div>`;
}

function renderMain(){
  const l = t();
  let content = "";

  if(state.step===0){
    content = `<h2>${l.s0}</h2>
    <div class="grid2">${l.garments.map(g=>`
      <div class="card${state.garment===g.id?" selected":""}" data-garment="${g.id}">
        <div class="card-garment">
          <div class="emoji">${g.emoji}</div>
          <div><div class="name">${g.name}</div><div class="desc">${g.desc}</div></div>
        </div>
      </div>`).join("")}</div>
    ${state.garment==="other"?`<div class="input-wrap"><label>${l.otherG} — ${l.otherGph.split("(")[0]}</label><input type="text" id="otherGInput" value="${escHtml(state.otherGarment)}" placeholder="${l.otherGph}"/></div>`:""}`;
  }

  else if(state.step===1){
    if(state.garment==="other"){
      content = `<h2>${l.s1}</h2>
      <div class="input-wrap"><label>${l.otherA}</label><textarea id="otherAInput" rows="5" placeholder="${l.otherAph}">${escHtml(state.otherAlt)}</textarea></div>`;
    } else {
      const alts = l.alts[state.garment]||[];
      const sel = selectedAlts();
      content = `<h2>${l.s1}</h2><p style="font-size:12px;color:#888;margin-bottom:12px">${l.s1sub}</p>
      <div class="grid2">${alts.map(a=>`
        <div class="card${state.selected[a.id]?" selected":""}" data-alt="${a.id}">
          <div class="card-alt">
            <div><div class="label">${a.name}</div><div class="sub">${a.desc}</div></div>
            <div class="price">$${a.price}</div>
          </div>
        </div>`).join("")}
        <div class="card other-card${state.selected["other_alt"]?" selected":""}" data-alt="other_alt">
          <div class="label">✏️ ${l.otherA}</div>
          ${state.selected["other_alt"]?`<textarea id="otherAInput" rows="2" style="margin-top:6px" placeholder="${l.otherAph}">${escHtml(state.otherAlt)}</textarea>`:""}
        </div>
      </div>
      ${sel.length>0?`<div class="subtotal">${l.nSelected(sel.length)} <strong>$${baseTotal()}</strong></div>`:""}`;
    }
  }

  else if(state.step===2){
    content = `<h2>${l.s2}</h2>
    <div style="display:flex;flex-direction:column;gap:10px">${l.urgency.map(u=>`
      <div class="card${state.urgency===u.id?" selected":""}" data-urgency="${u.id}">
        <div class="urgency-card">
          <div>
            <div class="urgency-label">${u.name}${u.badge?`<span class="urgency-badge">${u.badge}</span>`:""}</div>
            <div class="urgency-desc">${u.desc}</div>
          </div>
          <div class="urgency-price">
            <div class="amount">$${Math.round(baseTotal()*u.mult)}</div>
            <div class="est">${l.estimated}</div>
          </div>
        </div>
      </div>`).join("")}</div>`;
  }

  else if(state.step===3){
    const sel = selectedAlts();
    const urg = urgObj();
    content = `<h2>${l.s3}</h2>
    <div class="summary-label">${l.gLabel}</div>
    <div class="summary-box">${gEmoji()} ${gName()}</div>
    <div class="summary-label">${l.aLabel}</div>
    <div class="alt-list">
      ${state.garment==="other"
        ? `<div class="alt-row">${state.otherAlt}</div>`
        : sel.map(a=>`<div class="alt-row"><span>${a.name}</span><span style="font-weight:600">$${a.price}</span></div>`).join("")
          + (state.selected["other_alt"]&&state.otherAlt.trim()?`<div class="alt-row"><span style="color:#555">${state.lang==="en"?"Other: ":"其他："} ${state.otherAlt}</span><span style="color:#aaa;font-size:11px">${state.lang==="en"?"TBC":"待定"}</span></div>`:"")
          + (urg.mult>1?`<div class="alt-row surcharge"><span>${l.surcharge(urg.name,urg.badge)}</span><span style="font-weight:600">$${finalTotal()-baseTotal()}</span></div>`:"")
      }
    </div>
    <div class="summary-label">${l.tLabel}</div>
    <div class="summary-box" style="font-weight:400">${urg.name} — ${urg.desc}</div>
    ${state.garment!=="other"
      ? `<div class="total-bar"><div><div class="label">${l.total}</div><div class="note">${l.note}</div></div><div class="amount">$${finalTotal()}</div></div>`
      : `<div class="tbc-bar">${l.tbc}</div>`}
    <div class="price-note">${l.priceNote}</div>
    <div class="customer-section">
      <div class="summary-label">${l.yourInfo}</div>
      <input type="text" id="customerName" placeholder="${l.yourName}" value="${escHtml(state.customerName)}" style="margin-bottom:8px"/>
      <input type="text" id="customerWeChat" placeholder="${l.yourWeChat}" value="${escHtml(state.customerWeChat)}"/>
      <div style="font-size:11px;color:#aaa;margin-top:6px">${l.infoHint}</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" id="btnReset">${l.startOver}</button>
      <button class="btn btn-wechat" style="flex:2" id="btnBook">${l.book}</button>
    </div>
    <button class="btn-back-link" id="btnBack">${l.back}</button>`;
  }

  return `<div class="app">
    <div class="lang-bar">
      <button class="lang-btn${state.lang==="en"?" active":""}" data-lang="en">🇦🇺 English</button>
      <button class="lang-btn${state.lang==="zh"?" active":""}" data-lang="zh">🇨🇳 中文</button>
    </div>
    <div class="header"><div class="scissors">✂️</div><h1>${l.title}</h1><p>${l.subtitle}</p></div>
    ${renderSteps()}
    ${content}
    ${state.step<3?renderNav():""}
  </div>`;
}

function renderQR(){
  const l = t();
  const msg = buildMsg();
  return `<div class="qr-page">
    <button class="back" id="btnQRBack">${l.closeQR}</button>
    <div class="center">
      <div style="font-size:30px;margin-bottom:8px">💬</div>
      <h2>${l.scanQR}</h2>
      <div class="wechat-id-box">
        <span class="wechat-id-label">${l.wechatId}：</span>
        <span class="wechat-id-val">justinmel</span>
        <button class="btn-copy-id" id="btnCopyId">${state.copiedId?"✓":"复制"}</button>
      </div>
      <div class="device-hint">${l.mobileHint}</div>
      <img class="qr-img" src="${QR_IMG}" alt="WeChat QR Code" style="touch-action:manipulation"/>
      <div class="device-hint" style="margin-top:8px">${l.desktopHint}</div>
      <div class="copy-box" style="margin-top:16px">
        <div class="hint">${l.copyHint}</div>
        <pre>${escHtml(msg)}</pre>
      </div>
      <button class="btn-copy${state.copied?" copied":""}" id="btnCopy">${state.copied?l.copied:l.copyBtn}</button>
      <button class="btn-close" id="btnQRBack2">${l.closeQR}</button>
    </div>
  </div>`;
}

function escHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function setState(patch){ Object.assign(state,patch); render(); }

function attachEvents(){
  document.querySelectorAll("[data-lang]").forEach(el=>el.addEventListener("click",()=>{
    setState({lang:el.dataset.lang,step:0,garment:null,otherGarment:"",selected:{},otherAlt:"",urgency:"standard",showQR:false});
  }));
  document.querySelectorAll("[data-garment]").forEach(el=>el.addEventListener("click",()=>{
    const id=el.dataset.garment;
    if(id!==state.garment) setState({garment:id,selected:{},otherAlt:""});
    else setState({});
  }));
  document.querySelectorAll("[data-alt]").forEach(el=>el.addEventListener("click",e=>{
    if(e.target.tagName==="TEXTAREA") return;
    const id=el.dataset.alt;
    const sel={...state.selected,[id]:!state.selected[id]};
    setState({selected:sel});
  }));
  document.querySelectorAll("[data-urgency]").forEach(el=>el.addEventListener("click",()=>setState({urgency:el.dataset.urgency})));

  const oGInput=document.getElementById("otherGInput");
  if(oGInput) oGInput.addEventListener("input",e=>{ state.otherGarment=e.target.value; document.getElementById("btnNext")&&(document.getElementById("btnNext").disabled=!canNext()); });

  const oAInput=document.getElementById("otherAInput");
  if(oAInput) oAInput.addEventListener("input",e=>{ state.otherAlt=e.target.value; document.getElementById("btnNext")&&(document.getElementById("btnNext").disabled=!canNext()); });

  const btnNext=document.getElementById("btnNext");
  if(btnNext) btnNext.addEventListener("click",()=>setState({step:state.step+1}));

  const btnBack=document.getElementById("btnBack");
  if(btnBack) btnBack.addEventListener("click",()=>setState({step:Math.max(0,state.step-1)}));

  const btnReset=document.getElementById("btnReset");
  if(btnReset) btnReset.addEventListener("click",()=>setState({step:0,garment:null,otherGarment:"",selected:{},otherAlt:"",urgency:"standard",showQR:false,customerName:"",customerWeChat:""}));

  const customerNameInput=document.getElementById("customerName");
  if(customerNameInput) customerNameInput.addEventListener("input",e=>setState({customerName:e.target.value}));

  const customerWeChatInput=document.getElementById("customerWeChat");
  if(customerWeChatInput) customerWeChatInput.addEventListener("input",e=>setState({customerWeChat:e.target.value}));

  const btnBook=document.getElementById("btnBook");
  if(btnBook) btnBook.addEventListener("click",()=>{
    if(APPS_SCRIPT_URL && APPS_SCRIPT_URL!=="YOUR_APPS_SCRIPT_URL_HERE"){
      try{
        const urgency=urgObj();
        const data={
          timestamp:new Date().toLocaleString("zh-AU",{timeZone:"Australia/Melbourne"}),
          customerName:state.customerName.trim()||"（未填）",
          customerWeChat:state.customerWeChat.trim()||"（未填）",
          garment:gEmoji()+" "+gName(),
          services:state.garment==="other"
            ? state.otherAlt.trim()
            : [...selectedAlts().map(a=>a.name),(state.selected["other_alt"]&&state.otherAlt.trim()?"其他: "+state.otherAlt.trim():"")].filter(Boolean).join(", "),
          urgency:urgency.name+" ("+urgency.desc+")",
          estimatedTotal:state.garment!=="other"?"$"+finalTotal():"TBC",
          lang:state.lang
        };
        fetch(APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
      }catch(e){}
    }
    setState({showQR:true});
  });

  document.querySelectorAll("#btnQRBack,#btnQRBack2").forEach(el=>el&&el.addEventListener("click",()=>setState({showQR:false})));

  const btnCopy=document.getElementById("btnCopy");
  if(btnCopy) btnCopy.addEventListener("click",()=>{
    navigator.clipboard.writeText(buildMsg().replace(/\n/g,"\n")).then(()=>{
      setState({copied:true});
      setTimeout(()=>setState({copied:false}),3000);
    });
  });

  const copyIdBtn=document.getElementById("btnCopyId");
  if(copyIdBtn) copyIdBtn.addEventListener("click",()=>{
    navigator.clipboard.writeText("justinmel").then(()=>{
      setState({copiedId:true});
      setTimeout(()=>setState({copiedId:false}),3000);
    });
  });
}

render();
</script>
